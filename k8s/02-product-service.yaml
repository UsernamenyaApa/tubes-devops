apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: tubes-devops
spec:
  replicas: 1
  selector:
    matchLabels: { app: product-service }
  template:
    metadata:
      labels: { app: product-service }
    spec:
      containers:
      - name: product-service
        image: daffaaliefta/product-service:v1.0.0
        ports: [{ containerPort: 3002 }]
        resources:
          requests: { cpu: "50m", memory: "64Mi" }
          limits:   { cpu: "100m", memory: "128Mi" }
        livenessProbe:
          httpGet: { path: /health, port: 3002 }
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet: { path: /health, port: 3002 }
          initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: tubes-devops
spec:
  selector: { app: product-service }
  ports: [{ port: 80, targetPort: 3002 }]
  type: ClusterIP
